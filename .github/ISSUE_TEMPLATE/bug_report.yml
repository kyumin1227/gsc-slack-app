name: 버그 리포트
description: 버그를 제보해주세요
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        버그를 제보해주셔서 감사합니다. 아래 양식을 최대한 자세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했나요?
      placeholder: 문제 상황을 자세히 설명해주세요
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 순서를 작성해주세요
      placeholder: |
        1. '...' 버튼 클릭
        2. '...' 입력
        3. 오류 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로는 어떻게 동작했나요?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷 (선택)
      description: 문제 상황의 스크린샷을 첨부해주세요

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보 (선택)
      description: 그 외 참고할 내용이 있으면 작성해주세요
