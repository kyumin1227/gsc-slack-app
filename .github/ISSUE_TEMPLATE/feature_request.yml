name: 기능 요청
description: 새로운 기능을 제안해주세요
title: '[Feature] '
labels: ['✨ feat']
body:
  - type: markdown
    attributes:
      value: |
        기능을 제안해주셔서 감사합니다. 아래 양식을 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능을 원하시나요?
      placeholder: 원하는 기능을 자세히 설명해주세요
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 필요한 이유
      description: 이 기능이 왜 필요한가요?
      placeholder: 현재 불편한 점이나 이 기능이 해결할 문제를 설명해주세요
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 (선택)
      description: 고려해본 다른 방법이 있나요?

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보 (선택)
      description: 참고할 스크린샷, 링크 등이 있으면 첨부해주세요
