version: "3.8"
services:
  db:
    image: postgres:17.6 # м¶”нӣ„ MSAлЎң м „нҷҳ мӢң bitnamilegacyмқҳ postgresмҷҖ нҳёнҷҳмқ„ мң„н•ҙ лІ„м „ кі м •
    container_name: gsc-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gsc_slack_app
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
